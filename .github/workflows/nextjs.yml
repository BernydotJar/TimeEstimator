name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Replace AI flows with static stubs
        # Next.js detects 'use server' before webpack aliases run, so the Pages
        # build replaces server-only flows with browser-compatible adapters.
        run: |
          cp src/ai/stubs/estimate-analysis-flow.ts src/ai/flows/estimate-analysis-flow.ts
          cp src/ai/stubs/estimate-defaults-flow.ts src/ai/flows/estimate-defaults-flow.ts
          cp src/ai/stubs/estimate-summary-flow.ts src/ai/flows/estimate-summary-flow.ts
          cp src/ai/stubs/parse-steps-flow.ts src/ai/flows/parse-steps-flow.ts

      - name: Build static export
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          NEXT_PUBLIC_N8N_WEBHOOK_BASE_URL: ${{ vars.NEXT_PUBLIC_N8N_WEBHOOK_BASE_URL }}
          NEXT_PUBLIC_N8N_ANALYZE_ESTIMATE_URL: ${{ vars.NEXT_PUBLIC_N8N_ANALYZE_ESTIMATE_URL }}
          NEXT_PUBLIC_N8N_ESTIMATE_DEFAULTS_URL: ${{ vars.NEXT_PUBLIC_N8N_ESTIMATE_DEFAULTS_URL }}
          NEXT_PUBLIC_N8N_SUMMARIZE_ACTIVITIES_URL: ${{ vars.NEXT_PUBLIC_N8N_SUMMARIZE_ACTIVITIES_URL }}
          NEXT_PUBLIC_N8N_PARSE_STEPS_URL: ${{ vars.NEXT_PUBLIC_N8N_PARSE_STEPS_URL }}

      - name: Disable Jekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
