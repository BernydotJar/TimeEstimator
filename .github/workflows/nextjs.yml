name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare static build fallbacks for AI flows
        run: |
          cp src/ai/stubs/estimate-analysis-flow.ts src/ai/flows/estimate-analysis-flow.ts
          cp src/ai/stubs/estimate-defaults-flow.ts src/ai/flows/estimate-defaults-flow.ts
          cp src/ai/stubs/estimate-summary-flow.ts src/ai/flows/estimate-summary-flow.ts

      - name: Build static export
        run: npm run build

      - name: Disable Jekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
